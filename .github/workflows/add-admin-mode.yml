name: Add admin mode

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-admin-mode.yml'
      - 'scripts/add_admin_mode.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Patch index.html
        run: python scripts/add_admin_mode.py
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git diff --cached --quiet || git commit -m "新增網站管理模式"
          git push
